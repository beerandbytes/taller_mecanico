services:
  # App PHP + Apache (pensado para Coolify)
  web:
    build: .
    expose:
      - "80"
    volumes:
      - app_images:/var/www/html/assets/images
      - app_logs:/var/www/html/logs
      - app_cache:/var/www/html/cache
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      # Preferimos MYSQL_* para soportar tanto:
      # - MySQL dentro del mismo Compose (host: mysql)
      # - MySQL gestionado por Coolify (Coolify suele inyectar MYSQL_*)
      #
      # La app normaliza MYSQL_* -> DB_* en runtime (entrypoint + config/database.php).
      # Nota: usando MySQL gestionado por Coolify, estas variables deben venir del "link" de la DB.
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    networks:
      - app-network
    restart: unless-stopped
    # healthcheck and deploy sections temporarily disabled for debugging

  # Monitoring services temporarily disabled for debugging
  # prometheus:
  #   ...

  # alertmanager:
  #   ...

  # grafana:
  #   ...

  # node-exporter:
  #   ...

  # mysqld-exporter:
  #   ...

  # Backup Service - Daily MySQL Backups
  backup:
    build:
      context: .
      dockerfile: docker/backup.Dockerfile
    volumes:
      - mysql_backup:/backup
    environment:
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-trabajo_final_php}
      - BACKUP_RETENTION_DAYS=7
      - BACKUP_SCHEDULE=${BACKUP_SCHEDULE:-0 2 * * *}  # Daily at 2 AM by default
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'

networks:
  app-network:
    driver: bridge
  monitoring-network:
    driver: bridge

volumes:
  mysql_backup:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local
  app_images:
    driver: local
  app_logs:
    driver: local
  app_cache:
    driver: local
