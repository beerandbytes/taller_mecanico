global:
  smtp_smarthost: '__SMTP_SMARTHOST__'
  smtp_from: '__SMTP_FROM__'
  smtp_auth_username: '__SMTP_AUTH_USERNAME__'
  smtp_auth_password: '__SMTP_AUTH_PASSWORD__'
  smtp_require_tls: __SMTP_REQUIRE_TLS__

# Configuración de enrutamiento de alertas
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'email-default'
  routes:
  - match:
      severity: critical
    receiver: 'critical-alerts'
    group_wait: 10s
    repeat_interval: 5m
  - match:
      severity: warning
    receiver: 'warning-alerts'
    group_wait: 2m
    repeat_interval: 1h

# Receptores de notificaciones
receivers:
- name: 'email-default'
  email_configs:
  - to: '{{ if .CommonLabels.alert_to }}{{ .CommonLabels.alert_to }}{{ else }}__ALERT_EMAIL_TO__{{ end }}'
    send_resolved: true
    headers:
      subject: '[INFO] {{ .CommonLabels.alertname }} - Taller Mecánico'
    text: |
      Alerta Detectada

      Resumen: {{ .CommonLabels.alertname }}
      Severidad: {{ .CommonLabels.severity }}
      Servicio: {{ .CommonLabels.service }}
      Componente: {{ .CommonLabels.component }}

      Detalles:
      {{ range .Alerts }}
      - {{ .Annotations.summary }}
        Descripción: {{ .Annotations.description }}
        Instancia: {{ .Labels.instance }}
        Valor: {{ .Value }}
      {{ end }}

      Grafana: http://localhost:3000

      Mensaje automático del sistema de monitoreo.

- name: 'critical-alerts'
  email_configs:
  - to: '{{ if .CommonLabels.alert_to }}{{ .CommonLabels.alert_to }}{{ else }}__ALERT_EMAIL_TO__{{ end }}'
    send_resolved: true
    headers:
      subject: '[CRITICAL] {{ .CommonLabels.alertname }} - Taller Mecánico'
    text: |
      Alerta Crítica Detectada
      
      Resumen: {{ .CommonLabels.alertname }}
      Servicio: {{ .CommonLabels.service }}
      Componente: {{ .CommonLabels.component }}
      
      Detalles:
      {{ range .Alerts }}
      - {{ .Annotations.summary }}
        Descripción: {{ .Annotations.description }}
        Instancia: {{ .Labels.instance }}
        Valor: {{ .Value }}
      {{ end }}
      
      Por favor, revise el dashboard de Grafana: http://localhost:3000
      
      Este es un mensaje automático del sistema de monitoreo.

- name: 'warning-alerts'
  email_configs:
  - to: '{{ if .CommonLabels.alert_to }}{{ .CommonLabels.alert_to }}{{ else }}__ALERT_EMAIL_TO__{{ end }}'
    send_resolved: true
    headers:
      subject: '[WARNING] {{ .CommonLabels.alertname }} - Taller Mecánico'
    text: |
      Alerta de Advertencia
      
      Resumen: {{ .CommonLabels.alertname }}
      Servicio: {{ .CommonLabels.service }}
      Componente: {{ .CommonLabels.component }}
      
      Detalles:
      {{ range .Alerts }}
      - {{ .Annotations.summary }}
        Descripción: {{ .Annotations.description }}
        Instancia: {{ .Labels.instance }}
        Valor: {{ .Value }}
      {{ end }}
      
      Por favor, revise el dashboard de Grafana: http://localhost:3000
      
      Este es un mensaje automático del sistema de monitoreo.

# Inhibición de alertas (evitar spam)
inhibit_rules:
- source_match:
    severity: 'critical'
  target_match:
    severity: 'warning'
  equal: ['alertname', 'cluster', 'service']
